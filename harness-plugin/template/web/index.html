<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>영역 하네스 — 마인드맵</title>
<link rel="stylesheet" href="../Harness Ops Design System/styles.css">
<style>
  :root{
    /* 레거시 변수명 → Harness Ops Design System 토큰 매핑
       (토큰 정의는 ../Harness Ops Design System/styles.css. Harness 가 정의하는
        --accent/--surface-2/--border-strong/--danger/--info/--radius-*/--text-* 는 그대로 사용) */
    --bg: var(--bg-app);
    --surface: var(--surface-1);
    --border: var(--border-default);
    --text: var(--text-primary);
    --dim: var(--text-secondary);
    --ok: var(--success-text);
    --warn: var(--warning-text);
    --error: var(--danger-text);
    --mono: var(--font-mono);
    /* 일정(.ds) 레거시 이름 */
    --bg-primary: var(--bg-canvas);
    --bg-surface: var(--surface-1);
    --bg-elevated: var(--surface-2);
    --primary: var(--accent);
    --primary-soft: var(--accent-text);
    --font-brand: var(--font-sans);
    --font-text: var(--font-sans);
    --shadow-2: var(--shadow-sm);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  html{background:#0e0e10;}   /* @import 토큰 도착 전 흰 깜빡임(FOUC) 방지 */
  body{background:var(--bg,#0e0e10);color:var(--text,#ededf0);
    font-family:-apple-system,'Pretendard','Segoe UI',sans-serif;display:flex;height:100vh;}
  /* sidebar */
  .side{width:140px;flex:none;background:var(--surface);border-right:1px solid var(--border);
    padding:16px 8px;display:flex;flex-direction:column;gap:4px;}
  .side h1{font-size:14px;margin:0 8px 14px;color:var(--accent);}
  .tab{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;color:var(--dim);cursor:pointer;font-size:14px;}
  .tab .ic-tab{width:16px;height:16px;flex:none;}
  .tab:hover{background:var(--surface-2);color:var(--text);}
  .tab.active{background:var(--accent);color:#0b0f14;font-weight:600;}
  .side .spacer{flex:1;}
  .side .mini{font-size:11px;color:var(--dim);padding:6px 12px;cursor:pointer;border-radius:8px;}
  .side .mini:hover{background:var(--surface-2);color:var(--text);}
  .side .help{font-size:10px;color:var(--dim);padding:0 12px;line-height:1.6;}
  /* main = viewport (pan/zoom) */
  .main{flex:1;overflow:hidden;position:relative;cursor:grab;}
  .main.panning{cursor:grabbing;}
  .canvas{position:absolute;top:0;left:0;transform-origin:0 0;}
  svg.edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
  .node{position:absolute;width:172px;border-radius:10px;padding:10px 12px;cursor:grab;
    border:1px solid var(--border);background:var(--surface-2);user-select:none;}
  .node:hover{border-color:var(--accent);}
  .node.dragging{cursor:grabbing;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:5;}
  .node.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
  .node .t{font-size:14px;font-weight:600;}
  .node.global .t,.node.bridge .t{text-align:center;}
  .node .r{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;}
  .node.global{background:var(--accent);color:#0b0f14;border-color:var(--accent);}
  .node.global .r{color:#0b0f14;opacity:.7;}
  .node.bridge{background:var(--surface-2);border:2px dashed var(--accent);}
  .node.bridge .r{color:var(--accent);}
  .gauge{margin-top:8px;height:6px;border-radius:3px;background:#0d1117;overflow:hidden;}
  .gauge > i{display:block;height:100%;}
  .tree{font-size:12px;line-height:1.75;margin-top:6px;}
  .tree ul{list-style:none;margin:0;padding-left:18px;position:relative;}
  .tree ul::before{content:"";position:absolute;left:7px;top:0;bottom:7px;border-left:1px solid var(--border);}
  .tree li{position:relative;padding:1px 0;}
  .tree li::before{content:"";position:absolute;left:-11px;top:13px;width:9px;border-top:1px solid var(--border);}
  .tree > ul{padding-left:2px;}
  .tree > ul::before{display:none;}
  .tree > ul > li::before{display:none;}
  .tree .d{color:var(--text);font-weight:600;}
  .tree a{color:var(--dim);text-decoration:none;cursor:pointer;}
  .tree a:hover{color:var(--primary);text-decoration:underline;}
  .tree .ic{width:13px;height:13px;vertical-align:-2px;margin-right:5px;}
  .tree .d .ic{color:var(--primary);}
  .tree a .ic{color:var(--dim);}
  .tree li.empty{color:var(--dim);}
  .tree li.dir>.d{cursor:pointer;user-select:none;}
  .tree .caret{display:inline-block;width:11px;font-size:9px;color:var(--dim);}
  .m-img{max-width:100%;height:auto;display:block;margin:0 auto;border-radius:8px;}
  .m-frame{width:100%;height:72vh;border:0;border-radius:8px;background:#fff;}
  #m-body pre{max-width:100%;}
  #m-body pre[class*="language-"]{margin:0;}
  .ctxmenu{position:fixed;z-index:200;min-width:170px;display:none;padding:4px;font-size:13px;
    background:var(--surface-2,#1a1a1d);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md,0 8px 24px rgba(0,0,0,.5));}
  .ctxmenu.open{display:block;}
  .ctxmenu .mp{font-size:11px;color:var(--dim);font-family:var(--mono);padding:3px 10px 6px;word-break:break-all;}
  .ctxmenu .mi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--text);}
  .ctxmenu .mi:hover{background:var(--surface-1,#222);color:var(--primary);}
  .ctxmenu .mi .ic{width:15px;height:15px;}
  .gtxt{font-size:10px;color:var(--dim);font-family:var(--mono);margin-top:3px;}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);
    background:#1d3a4a;color:#79c0ff;border-radius:10px;padding:1px 7px;margin-top:6px;}
  /* zoom indicator */
  .zoom{position:absolute;left:12px;bottom:12px;background:var(--surface);border:1px solid var(--border);
    border-radius:8px;font-size:11px;font-family:var(--mono);color:var(--dim);padding:4px 10px;pointer-events:none;}
  /* panel */
  .panel{width:320px;flex:none;background:var(--surface);border-left:1px solid var(--border);
    padding:20px;overflow:auto;}
  .panel h2{font-size:16px;margin:0 0 4px;}
  .pnl-head{display:flex;align-items:center;gap:6px;}
  .rename-btn{flex:none;border:none;background:transparent;color:var(--dim);cursor:pointer;padding:2px;border-radius:6px;display:inline-flex;}
  .rename-btn:hover{background:var(--surface-2);color:var(--text);}
  .rename-btn .ic{margin-right:0;}
  .panel .role{font-size:12px;color:var(--dim);font-family:var(--mono);margin-bottom:16px;}
  .panel h3{font-size:12px;color:var(--accent);text-transform:uppercase;
    letter-spacing:.05em;margin:18px 0 8px;}
  .file{display:block;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:7px;margin-bottom:6px;color:var(--ok);text-decoration:none;font-size:13px;font-family:var(--mono);}
  .file:hover{border-color:var(--accent);}
  .file .meta{color:var(--dim);font-size:11px;font-family:-apple-system,sans-serif;margin-top:2px;}
  .cat{display:inline-block;font-size:10px;font-family:var(--mono);border:1px solid;border-radius:10px;
    padding:1px 7px;margin-right:6px;background:rgba(255,255,255,.04);vertical-align:middle;}
  .empty{color:var(--dim);font-size:13px;}
  .note{color:var(--danger);font-size:12px;margin-top:10px;}
  .hint{padding:40px;color:var(--dim);line-height:1.8;}
  .hint code{background:var(--surface-2);padding:2px 6px;border-radius:4px;color:var(--ok);font-family:var(--mono);}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.open{display:flex;}
  .modal{width:min(820px,92vw);max-height:86vh;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55);}
  .modal .bar{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);}
  .modal .bar .name{font-family:var(--mono);font-size:14px;color:var(--accent);font-weight:600;}
  .modal .bar .meta{font-size:11px;color:var(--dim);}
  .modal .bar .grow{flex:1;}
  .modal .bar a.raw{font-size:11px;color:var(--dim);text-decoration:none;font-family:var(--mono);}
  .modal .bar a.raw:hover{color:var(--text);}
  .modal .bar .x{cursor:pointer;color:var(--dim);font-size:22px;line-height:1;padding:0 4px;}
  .modal .bar .x:hover{color:var(--text);}
  .md{padding:20px 26px;overflow:auto;line-height:1.7;}
  .md h1{font-size:21px;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .md h2{font-size:17px;color:var(--accent);margin-top:22px;}
  .md h3{font-size:14px;margin-top:16px;}
  .md p{margin:8px 0;}
  .md code{background:var(--surface-2);padding:2px 6px;border-radius:4px;color:var(--ok);font-family:var(--mono);font-size:13px;}
  .md pre{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow:auto;}
  .md pre code{background:none;padding:0;color:var(--text);font-size:12px;}
  .md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;}
  .md th,.md td{border:1px solid var(--border);padding:7px 11px;text-align:left;}
  .md th{background:var(--surface-2);color:var(--accent);}
  .md blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--dim);}
  .md hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
  .md a{color:var(--accent);}
  .md ul{padding-left:22px;margin:8px 0;}
  .md .fm{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;
    font-family:var(--mono);font-size:12px;color:var(--dim);white-space:pre-wrap;margin-bottom:16px;}

  /* 디자인 토큰·폰트는 ../Harness Ops Design System/styles.css 에서 로드. 위 :root 가 레거시 이름에 매핑 */
  /* calendar */
  .cal{height:100%;display:flex;flex-direction:column;background:var(--bg-primary);padding:20px 24px;overflow:auto;}
  .cal-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .cal-title{font-family:var(--font-brand);font-size:24px;font-weight:700;}
  .cal-nav{display:flex;gap:6px;margin-left:auto;}
  .cal-btn{border:1px solid var(--border-strong);background:var(--bg-surface);color:var(--text-primary);
    border-radius:var(--radius-sm);padding:6px 13px;cursor:pointer;font-size:14px;font-family:var(--font-text);}
  .cal-btn:hover{background:var(--border);}
  .cal-btn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
  .cal-modes{margin-left:auto;display:flex;gap:6px;}
  .cal-month + .cal-month{margin-top:24px;}
  .cal-mtitle{font-family:var(--font-brand);font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text-secondary);}
  /* 1년 보기 — 연 전체를 작은 달력으로 나란히(한 화면에 채워 줄바꿈) */
  .cal-months.multi{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;align-items:start;}
  .cal-months.multi .cal-month + .cal-month{margin-top:0;}
  .cal.m3 .cal-grid{gap:4px;}
  .cal.m3 .cal-cell{min-height:54px;padding:4px;gap:2px;border-radius:6px;}
  .cal.m3 .cal-date{width:18px;height:18px;font-size:10px;}
  .cal.m3 .cal-dow{font-size:10px;padding:2px 0;}
  .cal.m3 .cal-mtitle{font-size:13px;margin-bottom:6px;}
  .cal.m3 .chip{font-size:9px;padding:1px 3px;min-height:13px;border-radius:4px;}
  .cal.m3 .chip-more{font-size:8px;}
  .cal.m3 .chip.r-start{margin-right:-4px;}
  .cal.m3 .chip.r-mid{margin-left:-4px;margin-right:-4px;}
  .cal.m3 .chip.r-end{margin-left:-4px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .cal-dow{text-align:center;font-size:12px;color:var(--text-secondary);padding:4px 0;font-weight:600;}
  .cal-dow.sun{color:var(--error);} .cal-dow.sat{color:var(--info);}
  .cal-cell{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);
    min-height:104px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:.15s;}
  .cal-cell:hover{box-shadow:var(--shadow-2);border-color:var(--border-strong);}
  .cal-cell.other{opacity:.4;}
  .cal-cell.sel{outline:2px solid var(--primary);outline-offset:-1px;}
  .cal-date{font-size:13px;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-pill);}
  .cal-date.sun{color:var(--error);} .cal-date.sat{color:var(--info);}
  .cal-cell.today .cal-date{background:var(--primary);color:#fff;}
  .chip{font-size:11px;color:var(--text-primary);border:1px solid var(--cc,var(--primary));border-radius:6px;
    padding:2px 6px;min-height:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip.done{text-decoration:line-through;color:var(--text-disabled);}
  /* 기간 일정 막대 — 이어지는 쪽 모서리를 펴고 셀 끝까지 늘려 연속 막대처럼 보이게 */
  .chip.r-start{border-top-right-radius:0;border-bottom-right-radius:0;margin-right:-8px;}
  .chip.r-mid{border-radius:0;margin-left:-8px;margin-right:-8px;}
  .chip.r-end{border-top-left-radius:0;border-bottom-left-radius:0;margin-left:-8px;}
  .chip-more{font-size:10px;color:var(--text-secondary);padding-left:2px;}
  .cal-legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px;}
  .lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);}
  .lg-dot{width:11px;height:11px;border-radius:3px;}
  .cat-dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:6px;}
  /* day detail (right panel) */
  .sch{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;color:var(--text-primary);}
  .sch h2{font-family:var(--font-brand);font-size:20px;font-weight:700;margin:0 0 4px;display:flex;align-items:center;gap:8px;}
  .sch-badge{font-family:var(--font-text);font-size:11px;background:var(--primary);color:#fff;border-radius:var(--radius-pill);padding:2px 9px;}
  .sch .sub{color:var(--text-secondary);font-size:12px;margin-bottom:14px;}
  .sch-item{display:flex;gap:10px;align-items:flex-start;padding:10px;border:1px solid var(--border);
    border-radius:var(--radius-md);margin-bottom:8px;background:var(--bg-elevated);cursor:pointer;transition:.15s;}
  .sch-item:hover{box-shadow:var(--shadow-2);}
  .sch-check{width:22px;height:22px;flex:none;display:flex;align-items:center;justify-content:center;}
  .sch-check .box{width:18px;height:18px;border:2px solid var(--border-strong);border-radius:6px;}
  .sch-check .ic-check{width:22px;height:22px;color:var(--primary);}
  .sch-item.done .sch-title{text-decoration:line-through;color:var(--text-disabled);}
  .sch-title{font-size:14px;font-weight:600;}
  .sch-time{font-size:12px;color:var(--text-secondary);margin-top:2px;display:flex;align-items:center;}
  .sch-empty{color:var(--text-secondary);font-size:13px;}
  /* schedule edit */
  .sch-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
  .sch-head .sch-meta{flex:1;} .sch-head .sub{margin-bottom:0;}
  .btn-add{flex:none;display:inline-flex;align-items:center;gap:4px;border:1px solid var(--primary);background:var(--primary);
    color:#fff;border-radius:var(--radius-sm);padding:6px 11px;cursor:pointer;font-size:13px;font-family:var(--font-text);}
  .btn-add:hover{filter:brightness(1.08);} .btn-add .ic{width:16px;height:16px;}
  .sch-edit{margin-left:auto;flex:none;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;padding:2px;border-radius:6px;}
  .sch-edit:hover{background:var(--border);color:var(--text-primary);} .sch-edit .ic{width:17px;height:17px;}
  .ev-dialog{border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:0;background:var(--bg-surface);
    color:var(--text-primary);max-width:340px;width:90vw;box-shadow:var(--shadow-2);}
  .ev-dialog::backdrop{background:rgba(0,0,0,.45);}
  .ev-form{padding:18px;display:flex;flex-direction:column;gap:12px;}
  .ev-form h3{font-family:var(--font-brand);font-size:18px;font-weight:700;margin:0;}
  .ev-form label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-secondary);}
  .ev-form input,.ev-form select{font-size:14px;font-family:var(--font-text);color:var(--text-primary);
    background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;}
  .ev-form .hint{font-size:11px;color:var(--text-disabled);}
  .ev-actions{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px;}
  .ev-actions>div{display:flex;gap:8px;}
  .btn-pri,.btn-ghost,.btn-del{border-radius:var(--radius-sm);padding:7px 14px;cursor:pointer;font-size:13px;font-family:var(--font-text);}
  .btn-pri{border:1px solid var(--primary);background:var(--primary);color:#fff;}
  .btn-ghost{border:1px solid var(--border-strong);background:var(--bg-surface);color:var(--text-primary);}
  .btn-del{border:1px solid var(--error);background:transparent;color:var(--error);}

  /* automation */
  .auto-wrap{height:100%;overflow:auto;padding:20px 24px;}
  .auto-h{font-size:22px;font-weight:700;margin:0 0 4px;}
  .auto-hsub{color:var(--dim);font-size:13px;margin-bottom:18px;line-height:1.6;}
  /* 대시보드 통계 + 필터 + 그룹 (자동화·로그 공용) */
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:10px;margin-bottom:18px;}
  .stat{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;border-left:3px solid var(--border);}
  .stat .n{font-size:23px;font-weight:700;line-height:1.05;}
  .stat .n .u{font-size:12px;font-weight:400;color:var(--dim);margin-left:3px;}
  .stat .l{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--mono);}
  .filt{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
  .filt-chip{font-size:12px;border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;color:var(--dim);background:var(--surface-2);}
  .filt-chip:hover{border-color:var(--accent);color:var(--text);}
  .filt-chip.on{background:var(--accent);border-color:var(--accent);color:#0b0f14;font-weight:600;}
  .filt-chip b{font-weight:700;margin-left:3px;opacity:.8;}
  .grp-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin:20px 0 9px;}
  .grp-h .gdot{width:11px;height:11px;border-radius:3px;flex:none;}
  .grp-h .gc{font-size:11px;color:var(--dim);font-weight:400;font-family:var(--mono);}
  .auto-card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;margin-bottom:10px;cursor:pointer;}
  .auto-card:hover{border-color:var(--accent);}
  .auto-card.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
  .auto-card.off{opacity:.5;}
  .auto-head{display:flex;align-items:center;gap:8px;}
  .auto-title{font-size:15px;font-weight:600;flex:1;}
  .chipt{font-size:10px;font-family:var(--mono);border:1px solid;border-radius:10px;padding:1px 8px;flex:none;}
  .auto-sub{color:var(--dim);font-size:12px;font-family:var(--mono);margin-top:7px;}
  .auto-pend{font-size:10px;color:var(--warn);margin-left:6px;font-family:var(--mono);}
  /* switch */
  .sw{position:relative;width:38px;height:20px;flex:none;cursor:pointer;}
  .sw input{display:none;}
  .sw i{position:absolute;inset:0;background:#3a4452;border-radius:20px;transition:.15s;display:block;}
  .sw i::after{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.15s;}
  .sw input:checked + i{background:var(--ok);}
  .sw input:checked + i::after{transform:translateX(18px);}

  .set-card .nm{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}

  document.addEventListener('mousedown', e=>{ if(ctxEl && ctxEl.classList.contains('open') && !ctxEl.contains(e.target)) hideMenu(); });
  document.addEventListener('scroll', hideMenu, true);
}

// ---- tidy tree auto-layout (row per leaf, parent = mid of children) ----
function autoLayout(){
  const ord = {}; let row = 0;
  (function place(id){
    const a = byId[id], kids = a.children || [];
    if(!kids.length){ ord[id] = row++; return; }
    kids.forEach(place);
    ord[id] = (ord[kids[0]] + ord[kids[kids.length-1]]) / 2;
  })(REG.root);
  const depth = id => { let d=0,c=byId[id]; while(c.parent){d++;c=byId[c.parent];} return d; };
  const p = {};
  for(const a of REG.areas) p[a.id] = { x: snap(MARGIN + depth(a.id)*COLW), y: snap(MARGIN + ord[a.id]*ROWH) };
  return p;
}

}

function undo(){
  if(!undoStack.length) return;
  pos=JSON.parse(undoStack.pop());
  savePositions();
  buildMindmap();
}

// ---- persistence (ponytail: localStorage, no backend) ----
function loadPositions(){
  try{
    const raw = localStorage.getItem(POS_KEY);
    if(!raw) return null;
    const saved = JSON.parse(raw);
    // only use if every current area has a saved position
    if(REG.areas.every(a => saved[a.id])) return saved;
  }catch(e){}
  return null;
}
function savePositions(){ try{ localStorage.setItem(POS_KEY, JSON.stringify(pos)); }catch(e){} }
function resetLayout(){ undoStack.push(JSON.stringify(pos)); if(undoStack.length>100) undoStack.shift(); localStorage.removeItem(POS_KEY); pos = autoLayout(); savePositions(); buildMindmap(); }

function buildMindmap(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  nodeEls = {};

  const canvas = document.createElement('div');
  canvas.className = 'canvas'; canvas.id = 'canvas';
  canvas.style.width = CANVAS_W+'px'; canvas.style.height = CANVAS_H+'px';

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('class','edges'); svg.id='edges';
  svg.setAttribute('width',CANVAS_W); svg.setAttribute('height',CANVAS_H);
  canvas.appendChild(svg);

  for(const a of REG.areas){
    const n = document.createElement('div');
    n.className = 'node '+a.role; n.id = 'n-'+a.id;
    n.innerHTML = nodeHtml(a);
    placeNode(n, a.id);
    attachDrag(n, a.id);
    n.addEventListener('contextmenu', ev=>showNodeMenu(ev, a));
    canvas.appendChild(n);
    nodeEls[a.id] = n;
  }
  main.appendChild(canvas);

  const z = document.createElement('div'); z.className='zoom'; z.id='zoom';
  main.appendChild(z);

  attachPanZoom(main, canvas);
  applyView();
  drawEdges();
}

function nodeHtml(a){
  let html = `<div class="t">${a.title}</div>`;
  if(a.role==='leaf' && (a.ssot||[]).some(isShared))
    html+=`<div class="badge">${icon('share','ic-badge')}공유 ssot</div>`;
  // 크기/분열 신호는 node check-registry.mjs 가 실파일에서 계산(손기입 토큰 게이지 제거)
  return html;
}
function placeNode(n,id){ n.style.left=pos[id].x+'px'; n.style.top=pos[id].y+'px'; }

function drawEdges(){
  const svg = document.getElementById('edges');
  const ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';
  for(const a of REG.areas){
    if(!a.parent || !pos[a.parent]) continue;
    const p=pos[a.parent], c=pos[a.id];
    const x1=p.x+NW, y1=p.y+NH/2, x2=c.x, y2=c.y+NH/2, mx=(x1+x2)/2;
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill','none'); path.setAttribute('stroke','#2d3744'); path.setAttribute('stroke-width','2');
    svg.appendChild(path);
  }
}

// ---- node drag (vs click) ----
function attachDrag(n, id){
  n.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    hideMenu();
    e.stopPropagation();            // don't start a pan
    e.preventDefault();
    const before = JSON.stringify(pos);
    const start = screenToCanvas(e);
    const off = { dx: start.x - pos[id].x, dy: start.y - pos[id].y };
    let moved = false;
    n.classList.add('dragging');

    const move = ev=>{
      const p = screenToCanvas(ev);
      pos[id] = { x: snap(p.x - off.dx), y: snap(p.y - off.dy) };   // 보이지 않는 격자에 스냅
      placeNode(n, id);
      drawEdges();
      moved = true;
    };
    const up = ()=>{
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      n.classList.remove('dragging');
      if(moved){ undoStack.push(before); if(undoStack.length>100) undoStack.shift(); savePositions(); } else select(id);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ---- canvas pan + wheel zoom ----
function attachPanZoom(main, canvas){
  main.addEventListener('mousedown', e=>{
    if(e.target.closest('.node')) return;           // node drag handles itself
    const sx=e.clientX, sy=e.clientY, vx=view.x, vy=view.y;
    main.classList.add('panning');
    const move=ev=>{ view.x=vx+(ev.clientX-sx); view.y=vy+(ev.clientY-sy); applyView(); };
    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); main.classList.remove('panning'); };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
  main.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect=main.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const ns=Math.min(2.5, Math.max(0.3, view.scale * (1 - e.deltaY*0.0015)));
    view.x = cx-(cx-view.x)*(ns/view.scale);
    view.y = cy-(cy-view.y)*(ns/view.scale);
    view.scale = ns;
    applyView();
  }, {passive:false});
}
function applyView(){
  document.getElementById('canvas').style.transform =
    `translate(${view.x}px,${view.y}px) scale(${view.scale})`;
  const z=document.getElementById('zoom'); if(z) z.textContent=`${Math.round(view.scale*100)}%`;
}
function screenToCanvas(e){
  const rect=document.getElementById('main').getBoundingClientRect();
  return { x:(e.clientX-rect.left-view.x)/view.scale, y:(e.clientY-rect.top-view.y)/view.scale };
}

function isShared(id){ return (REG.shared_ssot||[]).some(s=>s.id===id); }

// ---- ssot category (규칙|강제|설명|기억) — frontmatter 가 단일 소스 ----
const CATS={'규칙':'#58a6ff','강제':'#f85149','설명':'#7ee787','기억':'#bc8cff'};
function catBadge(cat){ const col=CATS[cat]||'#8b949e'; return `<span class="cat" style="color:${col};border-color:${col}">${cat||'미분류'}</span>`; }
function getCategory(md){
  const f=md.match(/^---\n([\s\S]*?)\n---/);
  const m=(f?f[1]:'').match(/(?:^|\n)category:\s*(\S+)/);
  return m && CATS[m[1]] ? m[1] : (m?m[1]:null);   // 알 수 없는 값이면 그대로 반환 → 미분류 색
}
function resolveSsot(a,id){
  const sh=sharedOf(id);

    const others=sh.shown_in.filter(x=>x!==a.id).map(x=>byId[x]?.title||x).join(', ');
    return { url:ROOT+sh.canonical, meta:`공유 — 같이 보는 영역: ${others||'없음'} · 정본 1파일` };
  }

}

function fileLink(href,name,meta){

// ---- 폴더 구조: manifest.json 기반, 폴더 기본 접힘(클릭 토글) ----
function treeNode(node, base){
  if(node.c){
    const kids = node.c.map(ch=>treeNode(ch, base+encodeURIComponent(node.n)+"/")).join("");
    return `<li class="dir"><span class="d"><span class="caret">▸</span>${icon("folder")}${node.n}</span><ul class="kids" hidden>${kids}</ul></li>`;
  }
  return `<li><a class="tfile" data-href="${base+encodeURIComponent(node.n)}" data-name="${node.n}">${icon("file")}${node.n}</a></li>`;
}
function fillTree(a){
  const el=document.getElementById("tree"); if(!el) return;
  const kids=(MANIFEST||{})[a.path];
  if(!kids||!kids.length){ el.innerHTML='<div class="empty">없음</div>'; return; }
  const base=ROOT+a.path+"content/";
  el.innerHTML='<ul>'+kids.map(ch=>treeNode(ch, base)).join("")+'</ul>';
}

// minimal markdown → html (ponytail: ~40줄, marked.js 대신. 우리 md 의 표/코드/제목/목록만 커버)
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function splitRow(ln){ return ln.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(s=>s.trim()); }
function mdToHtml(src){
  let fm='';
  const m=src.match(/^---\n([\s\S]*?)\n---\n?/);
  if(m){ fm=`<div class="fm">${esc(m[1])}</div>`; src=src.slice(m[0].length); }
  const inline=s=>esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const L=src.split('\n'), out=[]; let i=0;
  while(i<L.length){
    const ln=L[i];
    if(/^```/.test(ln)){                     // code fence
      i++; const buf=[];
      while(i<L.length && !/^```/.test(L[i])){ buf.push(L[i]); i++; }
      i++; out.push('<pre><code>'+esc(buf.join('\n'))+'</code></pre>'); continue;
    }
    if(/^\s*\|/.test(ln) && i+1<L.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(L[i+1]) && L[i+1].includes('-')){
      const head=splitRow(ln); i+=2; const rows=[];
      while(i<L.length && /^\s*\|/.test(L[i])){ rows.push(splitRow(L[i])); i++; }
      out.push('<table><thead><tr>'+head.map(c=>`<th>${inline(c)}</th>`).join('')+'</tr></thead><tbody>'
        +rows.map(r=>'<tr>'+r.map(c=>`<td>${inline(c)}</td>`).join('')+'</tr>').join('')+'</tbody></table>');
      continue;
    }
    const h=ln.match(/^(#{1,6})\s+(.*)/);
    if(h){ out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }
    if(/^---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    if(/^>\s?/.test(ln)){
      const buf=[]; while(i<L.length && /^>\s?/.test(L[i])){ buf.push(L[i].replace(/^>\s?/,'')); i++; }
      out.push('<blockquote>'+inline(buf.join(' '))+'</blockquote>'); continue;
    }
    if(/^\s*[-*]\s+/.test(ln)){
      const buf=[]; while(i<L.length && /^\s*[-*]\s+/.test(L[i])){ buf.push(L[i].replace(/^\s*[-*]\s+/,'')); i++; }
      out.push('<ul>'+buf.map(x=>`<li>${inline(x)}</li>`).join('')+'</ul>'); continue;
    }
    if(/^\s*$/.test(ln)){ i++; continue; }
    const buf=[ln]; i++;
    while(i<L.length && !/^\s*$/.test(L[i]) && !/^(#{1,6}\s|>|\s*[-*]\s|```|\s*\|)/.test(L[i])){ buf.push(L[i]); i++; }
    out.push('<p>'+inline(buf.join(' '))+'</p>');
  }
  return fm+out.join('\n');
}

// ===== 일정 (calendar) — 디자인 시스템 .ds 적용 =====
const DONE_KEY='area-harness-done';
const CALMODE_KEY='area-harness-calmode';      // 1달(1) / 1년(12) 보기
let EVENTS=null, viewY, viewM, selDate=null, calMode=(+localStorage.getItem(CALMODE_KEY)===12)?12:1;
const saveCalMode=()=>{ try{ localStorage.setItem(CALMODE_KEY,calMode); }catch(e){} };
let doneSet=new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]'));
function saveDone(){ try{ localStorage.setItem(DONE_KEY, JSON.stringify([...doneSet])); }catch(e){} }
const pad=n=>String(n).padStart(2,'0');
const fmt=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const DOW=['일','월','화','수','목','금','토'];

// 일정 종류(카테고리) — 색으로 구분
const CAT={ personal:{ko:'개인 일정',col:'#58a6ff'}, ai:{ko:'AI 일정',col:'#a371f7'}, auto:{ko:'자동화 일정',col:'#f0883e'} };
const catOf=e=>CAT[e.cat]?e.cat:'personal';
const endOf=e=>e.end||e.date;                 // 종료일(없으면 당일)
const isRange=e=>endOf(e)>e.date;
function catOptions(sel){ return Object.entries(CAT).map(([k,v])=>`<option value="${k}"${sel===k?' selected':''}>${v.ko}</option>`).join(''); }

// 사용자 편집 오버레이 — schedule.json(기준)에 더해 localStorage 에만 저장(파일 불변, done/automation 과 동일 규약)
const SCH_KEY='area-harness-schedule';
let SCH=Object.assign({added:[],patched:{},deleted:[]},JSON.parse(localStorage.getItem(SCH_KEY)||'{}'));
const saveSch=()=>{ try{ localStorage.setItem(SCH_KEY,JSON.stringify(SCH)); }catch(e){} };
function allEvents(){
  const del=new Set(SCH.deleted);
  const base=(EVENTS||[]).filter(e=>!del.has(e.id)).map(e=>SCH.patched[e.id]?{...e,...SCH.patched[e.id]}:e);
  return base.concat(SCH.added.filter(e=>!del.has(e.id)));
}
function findEvent(id){ return allEvents().find(e=>e.id===id); }
function upsertEvent(ev){                  // ev: {id?,date,end,time,title,area,cat}
  if(ev.end && ev.end<ev.date) ev.end='';   // ponytail: 종료<시작이면 기간 무시(당일 처리)
  if(ev.id){
    const i=SCH.added.findIndex(e=>e.id===ev.id);
    if(i>=0) SCH.added[i]=ev;               // 사용자가 추가한 항목 수정
    else SCH.patched[ev.id]={date:ev.date,end:ev.end,time:ev.time,title:ev.title,area:ev.area,cat:ev.cat};  // 기준 항목 패치
  } else { ev.id='u'+Date.now(); SCH.added.push(ev); }
  saveSch();
}
function deleteEvent(id){
  const i=SCH.added.findIndex(e=>e.id===id);
  if(i>=0) SCH.added.splice(i,1);
  else { if(!SCH.deleted.includes(id)) SCH.deleted.push(id); delete SCH.patched[id]; }
  doneSet.delete(id); saveDone(); saveSch();
}
function refreshSchedule(){ drawCalendar(); if(selDate) renderDayPanel(selDate); }
function areaOptions(sel){
  let o=`<option value="global"${sel==='global'?' selected':''}>전역(global)</option>`;
  (REG?.areas||[]).forEach(a=>{ o+=`<option value="${a.id}"${sel===a.id?' selected':''}>${esc(a.title)}</option>`; });
  return o;
}
function openEventForm(id, presetDate){
  const t=new Date();
  const cur=(id&&findEvent(id))||{date:presetDate||selDate||fmt(t.getFullYear(),t.getMonth(),t.getDate()),title:'',time:'',area:'global'};
  let d=document.getElementById('ev-dialog');
  if(!d){ d=document.createElement('dialog'); d.id='ev-dialog'; d.className='ev-dialog'; document.body.appendChild(d); }
  d.innerHTML=`<form id="ev-form" class="ev-form">
    <h3>${id?'일정 수정':'일정 추가'}</h3>
    <label>제목<input name="title" type="text" required maxlength="120" value="${esc(cur.title||'')}"></label>
    <label>종류<select name="cat">${catOptions(catOf(cur))}</select></label>
    <label>시작일<input name="date" type="date" required value="${cur.date||''}"></label>
    <label>종료일<input name="end" type="date" value="${cur.end||''}"><span class="hint">기간 일정(비우면 하루)</span></label>
    <label>시간<input name="time" type="time" value="${cur.time||''}"><span class="hint">비우면 종일</span></label>
    <label>영역<select name="area">${areaOptions(cur.area||'global')}</select></label>
    <div class="ev-actions">
      ${id?`<button type="button" class="btn-del" id="ev-del">삭제</button>`:'<span></span>'}
      <div><button type="button" class="btn-ghost" id="ev-cancel">취소</button>
      <button type="submit" class="btn-pri">저장</button></div>
    </div>
  </form>`;
  d.showModal();
  d.querySelector('#ev-cancel').onclick=()=>d.close();
  if(id) d.querySelector('#ev-del').onclick=()=>{ deleteEvent(id); d.close(); refreshSchedule(); };
  d.querySelector('#ev-form').onsubmit=(e)=>{
    e.preventDefault(); const f=e.target;
    const title=f.title.value.trim(); if(!title||!f.date.value) return;
    upsertEvent({ id:id||undefined, date:f.date.value, end:f.end.value, time:f.time.value, title, area:f.area.value, cat:f.cat.value });
    d.close(); selDate=f.date.value;
    const [y,m]=selDate.split('-').map(Number); viewY=y; viewM=m-1;
    refreshSchedule();
  };
}

async function renderSchedule(){
  if(!EVENTS){
    try{ EVENTS=((await (await fetch(ROOT+'schedule/schedule.json')).json()).events)||[]; }
    catch(e){ EVENTS=[]; }
  }
  const t=new Date();
  if(viewY===undefined){ viewY=t.getFullYear(); viewM=t.getMonth(); }
  drawCalendar();
  const todayStr=fmt(t.getFullYear(),t.getMonth(),t.getDate());
  if(viewY===t.getFullYear() && viewM===t.getMonth()){
    selDate=selDate||todayStr; renderDayPanel(selDate);
  } else {
    document.getElementById('panel').innerHTML='<div class="empty">날짜를 클릭하면 일정이 보입니다.</div>';
  }
}
// ds 를 포함하는 일정(기간 일정은 시작~종료 사이 모든 날). 기간 일정 먼저 → 달력 막대가 줄 맞춰 이어져 보임
function eventsOn(ds){
  return allEvents().filter(e=>e.date<=ds && ds<=endOf(e))
    .sort((a,b)=> (isRange(b)-isRange(a)) || a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||'') || a.id.localeCompare(b.id));
}
function evRole(e,ds){ const en=endOf(e); if(e.date===en) return 'single'; if(ds===e.date) return 'start'; if(ds===en) return 'end'; return 'mid'; }

function monthBlock(by,bm,todayStr){       // 한 달 그리드(제목+요일+42칸). bm: 이 블록의 월(0-11)
  const start=new Date(by,bm,1); start.setDate(1-start.getDay());   // 그 주 일요일로
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const y=d.getFullYear(), m=d.getMonth(), day=d.getDate(), ds=fmt(y,m,day), dow=d.getDay();
    const evs=eventsOn(ds);
    let chips=evs.slice(0,2).map(e=>{
      const dn=doneSet.has(e.id), role=evRole(e,ds), col=dn?'#8b949e':CAT[catOf(e)].col;
      const label=(role==='start'||role==='single')?esc(e.title):'&nbsp;';   // 이어지는 날은 색 막대만(같은 색으로 추적)
      return `<div class="chip r-${role} ${dn?'done':''}" data-ev="${e.id}" title="${esc(e.title)}" style="--cc:${col};background:${col}22;border-color:${col}">${label}</div>`;
    }).join('');
    if(evs.length>2) chips+=`<div class="chip-more">+${evs.length-2}</div>`;
    cells+=`<div class="cal-cell ${m!==bm?'other':''} ${ds===todayStr?'today':''} ${ds===selDate?'sel':''}" data-date="${ds}">
      <div class="cal-date ${dow===0?'sun':''} ${dow===6?'sat':''}">${day}</div>${chips}</div>`;
  }
  const dowRow=DOW.map((w,i)=>`<div class="cal-dow ${i===0?'sun':''} ${i===6?'sat':''}">${w}</div>`).join('');
  return `<div class="cal-month">
    ${calMode>1?`<div class="cal-mtitle">${by}년 ${bm+1}월</div>`:''}
    <div class="cal-grid">${dowRow}</div>
    <div class="cal-grid" style="margin-top:8px">${cells}</div>
  </div>`;
}

function drawCalendar(){
  const t=new Date(), todayStr=fmt(t.getFullYear(),t.getMonth(),t.getDate());
  let blocks='';
  if(calMode===12) for(let mo=0;mo<12;mo++) blocks+=monthBlock(viewY,mo,todayStr);   // 해당 연도 전체
  else blocks=monthBlock(viewY,viewM,todayStr);
  const title = calMode===12 ? `${viewY}년` : `${viewY}년 ${viewM+1}월`;
  document.getElementById('main').innerHTML=
    `<div class="ds cal ${calMode>1?'m3':''}">
      <div class="cal-top">
        <div class="cal-title">${title}</div>
        <div class="cal-modes">
          <button class="cal-btn ${calMode===1?'on':''}" id="cal-m1">1달</button>
          <button class="cal-btn ${calMode===12?'on':''}" id="cal-my">1년</button>
        </div>
        <div class="cal-nav">
          <button class="cal-btn" id="cal-prev">${icon('arrowL','ic-btn')}</button>
          <button class="cal-btn" id="cal-today">오늘</button>
          <button class="cal-btn" id="cal-next">${icon('arrowR','ic-btn')}</button>
        </div>
      </div>
      <div class="cal-legend">${Object.values(CAT).map(v=>`<span class="lg"><span class="lg-dot" style="background:${v.col}"></span>${v.ko}</span>`).join('')}</div>
      <div class="cal-months ${calMode>1?'multi':''}">${blocks}</div>
    </div>`;
  document.getElementById('cal-m1').onclick=()=>{ calMode=1; saveCalMode(); drawCalendar(); };
  document.getElementById('cal-my').onclick=()=>{ calMode=12; saveCalMode(); drawCalendar(); };
  document.getElementById('cal-prev').onclick=()=>{ if(calMode===12){viewY--;} else if(--viewM<0){viewM=11;viewY--;} drawCalendar(); };
  document.getElementById('cal-next').onclick=()=>{ if(calMode===12){viewY++;} else if(++viewM>11){viewM=0;viewY++;} drawCalendar(); };
  document.getElementById('cal-today').onclick=()=>{ const n=new Date(); viewY=n.getFullYear(); viewM=n.getMonth(); selDate=fmt(viewY,viewM,n.getDate()); drawCalendar(); renderDayPanel(selDate); };
  document.querySelectorAll('.cal-cell').forEach(c=>c.onclick=e=>{
    const ev=e.target.closest('.chip');
    if(ev && ev.dataset.ev){ toggleDone(ev.dataset.ev); return; }   // 그리드 칩 클릭 = 완료 토글
    selDate=c.dataset.date;
    const [y,m]=selDate.split('-').map(Number);
    if(calMode===1 && m-1!==viewM){ viewY=y; viewM=m-1; }   // 1달 보기에서만 다른 달 칸 클릭 시 그 달로 이동
    drawCalendar(); renderDayPanel(selDate);
  });
}

function toggleDone(id){
  doneSet.has(id) ? doneSet.delete(id) : doneSet.add(id);
  saveDone(); drawCalendar(); if(selDate) renderDayPanel(selDate);
}

function renderDayPanel(ds){
  const [y,m,d]=ds.split('-').map(Number), dt=new Date(y,m-1,d);
  const t=new Date(), todayStr=fmt(t.getFullYear(),t.getMonth(),t.getDate());
  const evs=eventsOn(ds), done=evs.filter(e=>doneSet.has(e.id)).length;
  let h=`<div class="ds"><div class="sch">
    <div class="sch-head"><div class="sch-meta">
      <h2>${m}월 ${d}일 <span style="font-size:14px;font-weight:400;color:var(--text-secondary)">(${DOW[dt.getDay()]})</span>
        ${ds===todayStr?'<span class="sch-badge">오늘</span>':''}</h2>
      <div class="sub">${evs.length}개 일정 · 완료 ${done}</div></div>
      <button class="btn-add" id="sch-add">${icon('plus','ic-btn')}추가</button></div>`;
  const md=(s)=>{ const [,mm,dd]=s.split('-'); return `${+mm}/${+dd}`; };
  h+= evs.length ? evs.map(e=>{
    const dn=doneSet.has(e.id), c=CAT[catOf(e)];
    return `<div class="sch-item ${dn?'done':''}" data-ev="${e.id}" style="border-left:3px solid ${c.col}">
      <div class="sch-check">${dn?icon('check','ic-check'):'<span class="box"></span>'}</div>
      <div><div class="sch-title">${esc(e.title)}</div>
      <div class="sch-time"><span class="cat-dot" style="background:${c.col}"></span>${c.ko}</div>
      ${isRange(e)?`<div class="sch-time">${icon('arrowR','ic-line')}${md(e.date)} – ${md(endOf(e))}</div>`:''}
      ${e.time?`<div class="sch-time">${icon('clock','ic-line')}${esc(e.time)}</div>`:''}
      ${e.area?`<div class="sch-time">${icon('place','ic-line')}${esc(byId[e.area]?.title||e.area)}</div>`:''}</div>
      <button class="sch-edit" data-edit="${e.id}" title="수정">${icon('edit','ic-line')}</button></div>`;
  }).join('') : `<div class="sch-empty">일정 없음</div>`;
  h+=`</div></div>`;
  const p=document.getElementById('panel'); p.innerHTML=h;
  p.querySelector('#sch-add').onclick=()=>openEventForm(null, ds);
  p.querySelectorAll('.sch-edit').forEach(b=>b.onclick=e=>{ e.stopPropagation(); openEventForm(b.dataset.edit); });
  p.querySelectorAll('.sch-item').forEach(it=>it.onclick=()=>toggleDone(it.dataset.ev));
}

// ===== 자동화 (automation) — 정의는 automation.json (Claude Code 가 유지). 페이지는 관리 대시보드. =====
// 실행은 외부(러너/Claude Code)가 담당. 토글·실행요청은 localStorage 보류 상태 → 외부가 반영.
const AUTO_EN_KEY='area-harness-auto-enabled';    // {id:bool} 사용자 토글 오버레이
const AUTO_REQ_KEY='area-harness-auto-requests';  // [{id,at}] 지금실행 보류 요청
let AUTOS=null, autoSel=null;
let autoEn=JSON.parse(localStorage.getItem(AUTO_EN_KEY)||'{}');
let autoReq=JSON.parse(localStorage.getItem(AUTO_REQ_KEY)||'[]');
const saveAutoEn=()=>{try{localStorage.setItem(AUTO_EN_KEY,JSON.stringify(autoEn));}catch(e){}};
const saveAutoReq=()=>{try{localStorage.setItem(AUTO_REQ_KEY,JSON.stringify(autoReq));}catch(e){}};
const TYPE_KO={action:'액션',cron:'크론',trigger:'트리거'};
const TYPE_COL={action:'#58a6ff',cron:'#7ee787',trigger:'#f0883e'};
const ENG_KO={ai:'AI',code:'코드'};
const ENG_COL={ai:'#bc8cff',code:'#8b949e'};
const isOn=a=> (a.id in autoEn) ? autoEn[a.id] : a.enabled;   // 오버레이 우선
const pendEn=a=> (a.id in autoEn) && autoEn[a.id]!==a.enabled;
const reqOf=id=> autoReq.find(r=>r.id===id);
const lastRun=a=>{ const r=(a.runs||[]).slice(-1)[0]; return r?((r.ts||'').replace('T',' ')+' '+r.status):null; };
const chip=(txt,col)=>`<span class="chipt" style="color:${col};border-color:${col}">${txt}</span>`;

function autoCardHtml(a){
  const col=TYPE_COL[a.type]||'#8b949e';
  const sched=a.type==='cron'?a.schedule : a.type==='trigger'? a.when : '수동 실행';
  const lr=lastRun(a);
  const sub=[ a.area?('대상: '+(byId[a.area]?.title||a.area)):'대상: 전체', sched, lr?('마지막: '+lr):'이력 없음' ].join('  ·  ');
  return `<div class="auto-card ${isOn(a)?'':'off'} ${a.id===autoSel?'sel':''}" data-id="${a.id}" style="border-left:3px solid ${col}">
    <div class="auto-head">
      ${chip(TYPE_KO[a.type]||a.type,TYPE_COL[a.type])}${chip(ENG_KO[a.engine]||a.engine,ENG_COL[a.engine])}
      <span class="auto-title">${esc(a.title)}${pendEn(a)?'<span class="auto-pend">⏳반영대기</span>':''}${reqOf(a.id)?'<span class="auto-pend">⏳실행요청</span>':''}</span>
      <label class="sw" data-tog="${a.id}"><input type="checkbox" ${isOn(a)?'checked':''}><i></i></label>
    </div>
    <div class="auto-sub">${esc(sub)}</div>
  </div>`;
}
async function renderAutomation(){
  if(!AUTOS){
    try{ AUTOS=((await (await fetch(ROOT+'automation/automation.json')).json()).automations)||[]; }
    catch(e){ AUTOS=[]; }
  }
  const on=AUTOS.filter(isOn).length, cnt=t=>AUTOS.filter(a=>a.type===t).length;
  const pend=AUTOS.filter(pendEn).length + autoReq.length;
  const stat=(n,l,col,u)=>`<div class="stat" style="border-left-color:${col||'var(--border)'}"><div class="n" style="${col?`color:${col}`:''}">${n}${u?`<span class="u">${u}</span>`:''}</div><div class="l">${l}</div></div>`;
  const dash=`<div class="dash">
    ${stat(AUTOS.length,'전체')}
    ${stat(on,'켜짐','var(--ok)',`/ ${AUTOS.length}`)}
    ${stat(cnt('cron'),'크론',TYPE_COL.cron)}
    ${stat(cnt('trigger'),'트리거',TYPE_COL.trigger)}
    ${stat(cnt('action'),'액션',TYPE_COL.action)}
    ${pend?stat(pend,'대기','var(--warn)'):''}
  </div>`;
  const groups=['cron','trigger','action'].filter(cnt).map(t=>
    `<div class="grp-h"><span class="gdot" style="background:${TYPE_COL[t]}"></span>${TYPE_KO[t]}<span class="gc">${cnt(t)}개</span></div>`
    + AUTOS.filter(a=>a.type===t).map(autoCardHtml).join('')
  ).join('');
  const body = AUTOS.length ? (dash+groups) : `<div class="empty">automation.json 이 비어있습니다. Claude Code 에게 자동화를 만들어 달라고 하세요.</div>`;
  document.getElementById('main').innerHTML=
    `<div class="auto-wrap"><div class="auto-h">자동화</div>
     <div class="auto-hsub">크론·트리거·액션 (AI 또는 코드). 정의는 Claude Code 가 만들고 여기서 관리.</div>
     ${body}</div>`;
  document.querySelectorAll('.auto-card').forEach(c=>c.onclick=e=>{
    const tg=e.target.closest('[data-tog]');
    if(tg){ e.preventDefault(); toggleAuto(tg.dataset.tog); return; }   // 스위치 클릭 = 토글
    autoSel=c.dataset.id; renderAutomation(); renderAutoDetail(autoSel);
  });
  if(autoSel) renderAutoDetail(autoSel);
  else document.getElementById('panel').innerHTML='<div class="empty">자동화를 클릭하면 상세가 보입니다.</div>';
}
function toggleAuto(id){
  const a=AUTOS.find(x=>x.id===id), next=!isOn(a);
  if(next===a.enabled) delete autoEn[id]; else autoEn[id]=next;   // def 와 같아지면 오버레이 제거
  saveAutoEn(); renderAutomation();
}
function runNow(id){ if(!reqOf(id)) autoReq.push({id,at:new Date().toISOString()}); saveAutoReq(); renderAutomation(); renderAutoDetail(id); }
function clearReq(id){ autoReq=autoReq.filter(r=>r.id!==id); saveAutoReq(); renderAutomation(); renderAutoDetail(id); }

function renderAutoDetail(id){
  const a=AUTOS.find(x=>x.id===id); if(!a) return;
  const req=reqOf(id);
  let h=`<div class="ad"><h2>${esc(a.title)}</h2>
    <div class="role">${chip(TYPE_KO[a.type]||a.type,TYPE_COL[a.type])} ${chip(ENG_KO[a.engine]||a.engine,ENG_COL[a.engine])} · ${isOn(a)?'켜짐':'꺼짐'}${pendEn(a)?' (반영대기)':''}</div>
    <div class="row"><span class="k">대상</span><span>${a.area?(byId[a.area]?.title||a.area):'전체 하네스'}</span></div>`;
  if(a.type==='cron')    h+=`<div class="row"><span class="k">스케줄</span><span class="v">${esc(a.schedule||'')}</span></div>`;
  if(a.type==='trigger') h+=`<div class="row"><span class="k">조건</span><span class="v">${esc(a.when||'')}</span></div>`;
  if(a.engine==='ai'){
    h+=`<div class="row"><span class="k">모델</span><span class="v">${esc(a.model||'claude-opus-4-8')}</span></div>
        <div class="prompt">${esc(a.prompt||'')}</div>`;
  } else {
    h+=`<div class="row"><span class="k">실행</span><span class="v">${esc(a.run||'')}</span></div>`;
  }
  h+=`<div class="ad-btns">
      <button class="ad-btn" data-tog="${a.id}">${isOn(a)?'끄기':'켜기'}</button>
      <button class="ad-btn" data-run="${a.id}">${req?'실행 요청됨 ✓':'지금 실행'}</button>
    </div>`;
  if(req) h+=`<div class="note" style="color:var(--warn)">⏳ 실행 요청됨 (${esc(req.at.replace('T',' ').slice(0,16))}) — 외부 러너/Claude Code 가 반영. <a href="#" data-clr="${a.id}" style="color:var(--accent)">요청 취소</a></div>`;
  h+=`<h3 style="color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin:18px 0 8px">실행 이력 / 로그</h3>`;
  h+= (a.runs||[]).length ? [...a.runs].reverse().map(r=>
        `<div class="run ${r.status==='ok'?'ok':'fail'}"><div class="rt">${esc((r.ts||'').replace('T',' '))} · ${esc(r.by||'')}</div>
         <div class="rb"><span class="rs">${esc(r.status||'')}</span> — ${esc(r.summary||'')}</div></div>`).join('')
     : `<div class="empty">실행 이력 없음</div>`;
  h+=`</div>`;
  const p=document.getElementById('panel'); p.innerHTML=h;
  p.querySelector('[data-tog]')?.addEventListener('click',()=>toggleAuto(id));
  p.querySelector('[data-run]')?.addEventListener('click',()=>runNow(id));
  p.querySelector('[data-clr]')?.addEventListener('click',e=>{e.preventDefault();clearReq(id);});
}

// ===== 설정 (settings) — 키 스키마는 settings.json(내가 유지, 시크릿 없음), 값은 localStorage =====
// ponytail: 시크릿은 localStorage 평문(브라우저 로컬, 저장소 커밋 안 됨). 러너는 gitignore된 env 에서 읽음 → '.env 복사'로 옮김.
//           공유/서버 운용 필요해지면 OS 키체인·시크릿 매니저로 승격.
const SECRETS_KEY='area-harness-secrets';
let SETTINGS=null;
let secrets=JSON.parse(localStorage.getItem(SECRETS_KEY)||'{}');
const saveSecrets=()=>{try{localStorage.setItem(SECRETS_KEY,JSON.stringify(secrets));}catch(e){}};

// --- env 파일 자동 저장: File System Access API + IndexedDB 핸들 보관 ---
// ponytail: 정적 페이지가 디스크 못 쓰는 제약을 네이티브 API 로 우회. env 파일 1회 선택 후 재사용.
//           미지원(파폭/사파리)·비보안 컨텍스트면 클립보드로 폴백.
let envHandle=null;
const IDB={db:'area-harness',store:'handles',key:'envFile'};
function _idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open(IDB.db,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(IDB.store);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbGet(){ const d=await _idb(); return new Promise(res=>{ const q=d.transaction(IDB.store).objectStore(IDB.store).get(IDB.key); q.onsuccess=()=>res(q.result||null); q.onerror=()=>res(null); }); }
async function idbPut(v){ const d=await _idb(); return new Promise(res=>{ const t=d.transaction(IDB.store,'readwrite'); t.objectStore(IDB.store).put(v,IDB.key); t.oncomplete=()=>res(); t.onerror=()=>res(); }); }
async function idbDel(){ const d=await _idb(); return new Promise(res=>{ const t=d.transaction(IDB.store,'readwrite'); t.objectStore(IDB.store).delete(IDB.key); t.oncomplete=()=>res(); t.onerror=()=>res(); }); }
const buildEnv=()=>Object.entries(secrets).filter(([,v])=>v).map(([k,v])=>`${k}=${v}`).join('\n');
async function ensurePerm(h){ const o={mode:'readwrite'};
  if((await h.queryPermission(o))==='granted') return true;
  return (await h.requestPermission(o))==='granted'; }

async function saveEnvFile(){
  const msg=document.getElementById('set-msg');
  const body=buildEnv(), n=body?body.split('\n').length:0;
  if(!n){ msg.style.color='var(--warn)'; msg.textContent='입력된 키가 없습니다.'; return; }
  if(!('showSaveFilePicker' in window)){              // 미지원 → 클립보드 폴백
    try{ await navigator.clipboard.writeText(body+'\n'); msg.style.color='var(--ok)';
      msg.textContent=`이 브라우저는 파일 자동저장 미지원 → ${n}개 키를 클립보드에 복사했습니다. env 파일에 붙여넣으세요.`; }
    catch(e){ msg.style.color='var(--text)'; msg.innerHTML='자동저장·복사 모두 불가 — 직접 복사:<pre style="white-space:pre-wrap;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:10px;margin-top:6px">'+esc(body)+'</pre>'; }
    return;
  }
  try{
    if(!envHandle) envHandle=await idbGet();
    if(envHandle && !(await ensurePerm(envHandle))) envHandle=null;
    if(!envHandle){
      envHandle=await window.showSaveFilePicker({suggestedName:'automation.env',
        types:[{description:'env file',accept:{'text/plain':['.env','.txt']}}]});
      await idbPut(envHandle);
    }
    const w=await envHandle.createWritable(); await w.write(body+'\n'); await w.close();
    msg.style.color='var(--ok)'; msg.textContent=`✓ ${envHandle.name} 에 ${n}개 키 저장됨. 러너가 이 파일을 읽게 하세요(gitignore 필수).`;
  }catch(e){ if(e.name==='AbortError') return; msg.style.color='var(--danger)'; msg.textContent='저장 실패: '+(e.message||e.name); }
}

async function renderSettings(){
  if(!SETTINGS){
    try{ SETTINGS=await (await fetch(ROOT+'settings.json')).json(); }
    catch(e){ SETTINGS={providers:[],channels:[]}; }
  }
  const group=items=> (items||[]).map(p=>{
    const filled=p.fields.filter(f=>secrets[f.key]).length;
    const fields=p.fields.map(f=>
      `<div class="fld"><label>${esc(f.label)} <span class="ek">${esc(f.key)}</span></label>
        <div class="in">
          <input type="password" data-key="${f.key}" placeholder="${esc(f.placeholder||'')}" value="${esc(secrets[f.key]||'')}" autocomplete="off" spellcheck="false">
          <button class="eye" type="button">표시</button>
        </div></div>`).join('');
    return `<div class="set-card"><div class="nm">${esc(p.label)}${filled?`<span class="filled">● ${filled}/${p.fields.length} 입력됨</span>`:''}</div>${fields}</div>`;
  }).join('') || '<div class="empty">없음</div>';

  document.getElementById('main').innerHTML=
    `<div class="set-wrap"><div class="set-h">설정</div>
     <div class="set-hsub">각 AI 플랫폼·채널의 키 값.</div>
     <div class="set-warn">⚠ 키는 <b>이 브라우저에만</b> 저장됩니다(localStorage). 저장소에 커밋되지 않습니다.
       <b>「env 파일에 저장」</b>으로 러너가 읽을 env 파일을 한 번 고르면, 이후 그 파일에 자동 기록됩니다. <b>그 파일은 반드시 gitignore</b> 하세요.</div>
     <div class="set-sec">AI 플랫폼</div>${group(SETTINGS.providers)}
     <div class="set-sec">채널</div>${group(SETTINGS.channels)}
     <div class="set-btns">
       <button class="ad-btn" id="set-export">env 파일에 저장</button>
       <button class="ad-btn" id="set-rechoose">대상 파일 변경</button>
       <button class="ad-btn" id="set-clear">모두 지우기</button>
     </div>
     <div class="set-msg" id="set-msg"></div></div>`;
  document.getElementById('panel').innerHTML='<div class="empty">설정은 본문에서 편집합니다.</div>';

  document.querySelectorAll('.set-wrap input[data-key]').forEach(inp=>{
    inp.oninput=()=>{ const k=inp.dataset.key; if(inp.value) secrets[k]=inp.value; else delete secrets[k]; saveSecrets(); };
  });
  document.querySelectorAll('.set-wrap .eye').forEach(b=>{
    b.onclick=()=>{ const inp=b.parentElement.querySelector('input'); const pw=inp.type==='password';
      inp.type=pw?'text':'password'; b.textContent=pw?'숨김':'표시'; };
  });
  document.getElementById('set-export').onclick=saveEnvFile;
  document.getElementById('set-rechoose').onclick=async()=>{ envHandle=null; await idbDel(); saveEnvFile(); };
  document.getElementById('set-clear').onclick=()=>{
    if(confirm('이 브라우저에 저장된 모든 키를 지웁니다.')){ secrets={}; saveSecrets(); renderSettings(); }
  };
}

// ===== 로그 (logs) — 전영역 변경 이력 단일 소스 logs/log.jsonl (append-only). 읽기 전용. =====
let LOG=null;
async function loadLog(){
  if(LOG) return LOG;
  try{
    const txt=await (await fetch(ROOT+'logs/log.jsonl')).text();
    LOG=txt.split('\n').filter(l=>l.trim()).map(l=>{try{return JSON.parse(l);}catch(e){return null;}}).filter(Boolean);
  }catch(e){ LOG=[]; }
  return LOG;
}
const OPCOL={area:'#58a6ff',ssot:'#bc8cff',schedule:'#7ee787',automation:'#f0883e',settings:'#8b949e'};
const LOGCAT={area:'영역',ssot:'SSOT',schedule:'일정',automation:'자동화',settings:'설정'};
const logCat=e=>(e.op||'').split(':')[0];
const opColor=op=>OPCOL[(op||'').split(':')[0]]||'#8b949e';
let logFilter='all';
async function renderLog(){
  const log=await loadLog();
  const counts={}; log.forEach(e=>{ const c=logCat(e); counts[c]=(counts[c]||0)+1; });
  const runs=log.filter(e=>logCat(e)==='automation');
  const fails=runs.filter(e=>e.status && e.status!=='ok').length;
  const last=[...log].sort((a,b)=>(b.ts||'').localeCompare(a.ts||''))[0];
  const stat=(n,l,col)=>`<div class="stat" style="border-left-color:${col||'var(--border)'}"><div class="n" style="${col?`color:${col}`:''}">${n}</div><div class="l">${l}</div></div>`;
  const dash=`<div class="dash">
    ${stat(log.length,'전체 기록')}
    ${stat(runs.length,'자동화 실행',OPCOL.automation)}
    ${stat(fails,'실패',fails?'var(--danger)':'var(--ok)')}
    ${stat(last?esc(last.ts.slice(5,10)):'-','최근','var(--accent)')}
  </div>`;
  const chips=`<div class="filt">
    <span class="filt-chip ${logFilter==='all'?'on':''}" data-f="all">전체<b>${log.length}</b></span>
    ${Object.keys(LOGCAT).filter(c=>counts[c]).map(c=>`<span class="filt-chip ${logFilter===c?'on':''}" data-f="${c}" style="${logFilter===c?'':`border-color:${OPCOL[c]}66`}">${LOGCAT[c]}<b>${counts[c]}</b></span>`).join('')}
  </div>`;
  const view=logFilter==='all'?log:log.filter(e=>logCat(e)===logFilter);
  const rows=[...view].sort((a,b)=>(b.ts||'').localeCompare(a.ts||'')).map(e=>{
    const col=opColor(e.op);
    const st=e.status?` <span style="color:${e.status==='ok'?'var(--ok)':'var(--danger)'}">${esc(e.status)}</span>`:'';
    return `<div class="auto-card" style="cursor:default;border-left:3px solid ${col}">
      <div class="auto-head">
        <span class="chipt" style="color:${col};border-color:${col}">${esc(e.op||'')}</span>
        <span class="auto-title" style="font-size:13px">${esc(e.summary||'')}${st}</span>
      </div>
      <div class="auto-sub">${esc((e.ts||'').replace('T',' '))} · ${esc(e.actor||'')}${e.target?(' · '+esc(e.target)):''}</div>
    </div>`;
  }).join('') || `<div class="empty">${logFilter==='all'?'로그 없음. 영역·ssot·일정·자동화 변경 시 logs/log.jsonl 에 한 줄씩 쌓입니다.':'이 카테고리의 기록이 없습니다.'}</div>`;
  document.getElementById('main').innerHTML=
    `<div class="auto-wrap"><div class="auto-h">로그</div>
     <div class="auto-hsub">전영역 변경 이력(영역·ssot·일정·자동화·설정). append-only <code>logs/log.jsonl</code>.</div>
     ${dash}${chips}${rows}</div>`;
  document.querySelectorAll('.filt-chip').forEach(c=>c.onclick=()=>{ logFilter=c.dataset.f; renderLog(); });
  document.getElementById('panel').innerHTML='<div class="empty">기록 단일 소스: logs/log.jsonl</div>';
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  if(t.dataset.tab==='area'){ buildMindmap(); return; }
  if(t.dataset.tab==='schedule'){ renderSchedule(); return; }
  if(t.dataset.tab==='auto'){ renderAutomation(); return; }
  if(t.dataset.tab==='settings'){ renderSettings(); return; }
  if(t.dataset.tab==='log'){ renderLog(); return; }
}

function showHint(){
  document.getElementById('main').innerHTML=
    `<div class="hint"><h2>로컬 파일은 직접 못 읽습니다</h2>
     브라우저가 <code>file://</code> 에서 <code>registry.json</code> fetch 를 막습니다.<br>
     하네스 루트(<code>area-harness/</code>)에서 정적 서버를 띄우세요:<br><br>
     <code>python -m http.server</code><br><br>
     그 뒤 <code>http://localhost:8000/web/</code> 로 접속.</div>`;
}
