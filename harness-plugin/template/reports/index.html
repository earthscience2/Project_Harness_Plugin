<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>보고서</title>
<link rel="stylesheet" href="../Harness Ops Design System/styles.css">
<style>
  html{background:var(--bg-app,#0e0e10);}
  body{margin:0;background:var(--bg-app,#0e0e10);color:var(--text-primary,#ededf0);
    font-family:-apple-system,'Pretendard','Segoe UI',sans-serif;padding:32px 28px;max-width:880px;margin:0 auto;}
  h1{font-size:24px;margin:0 0 4px;color:var(--accent);}
  .sub{color:var(--text-secondary);font-size:13px;margin-bottom:24px;line-height:1.6;}
  .sub code{background:var(--surface-2);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);}
  a.card{display:block;text-decoration:none;background:var(--surface-1);border:1px solid var(--border-default);
    border-radius:10px;padding:14px 16px;margin-bottom:10px;color:inherit;}
  a.card:hover{border-color:var(--accent);}
  .ct{font-size:16px;font-weight:600;}
  .cm{font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:4px;}
  .cs{font-size:13px;color:var(--text-secondary);margin-top:6px;line-height:1.5;}
  .empty{color:var(--text-secondary);font-size:14px;padding:24px 0;line-height:1.7;}
</style>
</head>
<body>
  <h1>보고서</h1>
  <div class="sub">연구 HTML 보고서 목록. 단일 소스는 <code>reports.json</code> — 새 보고서는 <code>_template.html</code> 복사 후 그 파일에 한 줄 추가.</div>
  <div id="list"></div>
<script>
(async () => {
  const el = document.getElementById('list');
  let data;
  try { data = await (await fetch('reports.json')).json(); } catch (e) { data = { reports: [] }; }
  const rs = (data.reports || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (!rs.length) { el.innerHTML = '<div class="empty">아직 보고서가 없습니다.<br>_template.html 을 복사해 만들고 reports.json 에 추가하세요.</div>'; return; }
  el.innerHTML = rs.map(r => `<a class="card" href="${r.file}">
    <div class="ct">${r.title || r.file}</div>
    <div class="cm">${r.date || ''}${r.area ? ' · ' + r.area : ''}</div>
    ${r.summary ? `<div class="cs">${r.summary}</div>` : ''}</a>`).join('');
})();
</script>
</body>
</html>
