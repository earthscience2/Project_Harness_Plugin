<!-- @dsCard group="Harness Console" viewport="1440x900" name="Harness Console" subtitle="평가 하네스 운영 콘솔 — 대시보드 · 실행 관리 · 상세 드로어" -->
<!-- @startingPoint section="Harness Console" subtitle="Full ML eval-harness ops console (dashboard + runs table)" viewport="1440x900" -->
<!doctype html>
<html lang="ko" data-theme="dark" data-accent="teal">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harness Console</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-app); }
  #app { height: 100vh; }
  @keyframes hns-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes hns-slide { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-tertiary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="./icons.jsx"></script>
<script type="text/babel" src="./data.jsx"></script>
<script type="text/babel" src="./AppShell.jsx"></script>
<script type="text/babel" src="./DashboardScreen.jsx"></script>
<script type="text/babel" src="./RunsScreen.jsx"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" data-presets="react">
const Icon = window.HNSIcon;
const TITLES = { dashboard: '대시보드', runs: '실행', suites: '스위트', datasets: '데이터셋', metrics: '메트릭', settings: '설정' };
const ACCENTS = ['teal', 'blue', 'amber', 'violet'];

function SettingsScreen() {
  const { Card, Switch, Select, Input, Button } = window.HarnessOpsDesignSystem_019284;
  return (
    <div style={{ maxWidth: 720, display: 'flex', flexDirection: 'column', gap: 'var(--space-5)' }}>
      <Card title="실행 기본값" subtitle="새 실행에 적용되는 기본 설정">
        <Card.Body>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 'var(--space-5)' }}>
            <Select label="기본 모델" options={window.HNSData.MODELS} />
            <Input label="동시 실행 한도" mono defaultValue="8" />
          </div>
        </Card.Body>
      </Card>
      <Card title="알림">
        <Card.Body>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--space-4)' }}>
            <Switch label="실패 발생 시 알림" defaultChecked />
            <Switch label="실행 완료 알림" defaultChecked />
            <Switch label="회귀 감지 시 Slack 전송" />
          </div>
        </Card.Body>
        <Card.Footer><Button variant="primary">저장</Button><Button variant="ghost">초기화</Button></Card.Footer>
      </Card>
    </div>
  );
}

function Empty({ label }) {
  return <div className="empty"><Icon name="database" size={32} style={{ color: 'var(--border-strong)' }} /><span>{label} 화면은 이 데모에 포함되지 않았습니다.</span></div>;
}

function App() {
  const [active, setActive] = React.useState('dashboard');
  const [accentIdx, setAccentIdx] = React.useState(0);
  const [theme, setTheme] = React.useState('dark');
  const [openRun, setOpenRun] = React.useState(null);

  React.useEffect(() => { document.documentElement.setAttribute('data-accent', ACCENTS[accentIdx]); }, [accentIdx]);
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  const AppShell = window.HNSAppShell;
  const { Button } = window.HarnessOpsDesignSystem_019284;

  let screen;
  if (active === 'dashboard') screen = <window.HNSDashboard onOpenRun={(r) => { setActive('runs'); setOpenRun(r); }} />;
  else if (active === 'runs') screen = <window.HNSRuns openRun={openRun} setOpenRun={setOpenRun} />;
  else if (active === 'settings') screen = <SettingsScreen />;
  else screen = <Empty label={TITLES[active]} />;

  const actions = active === 'runs'
    ? <Button variant="primary" size="sm" iconLeft={<Icon name="play" size={14} />}>새 실행</Button>
    : null;

  return (
    <AppShell active={active} onNav={(k) => { setActive(k); if (k !== 'runs') setOpenRun(null); }}
      title={TITLES[active]} actions={actions}
      accent={ACCENTS[accentIdx]} onCycleAccent={() => setAccentIdx((accentIdx + 1) % ACCENTS.length)}
      theme={theme} onToggleTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
      {screen}
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
