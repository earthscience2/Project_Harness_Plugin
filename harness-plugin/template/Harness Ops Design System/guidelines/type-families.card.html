<!-- @dsCard group="Type" viewport="700x180" name="서체 — Pretendard & JetBrains Mono" subtitle="UI/Hangul sans + numeric/identifier mono" -->
<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .blk { display: flex; flex-direction: column; gap: 8px; }
  .fam { font: var(--weight-tertiary) var(--text-xs)/1 var(--font-sans); color: var(--text-tertiary); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .big { font-family: var(--font-sans); font-size: 40px; font-weight: 700; color: var(--text-primary); letter-spacing: var(--tracking-tight); line-height: 1; }
  .bigm { font-family: var(--font-mono); font-size: 40px; font-weight: 500; color: var(--text-primary); line-height: 1; font-feature-settings: "tnum" 1; }
  .specimen { font-family: var(--font-sans); font-size: 15px; color: var(--text-secondary); line-height: 1.5; }
  .specimenm { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); }
  .w { display:flex; gap:12px; font-family: var(--font-sans); color: var(--text-secondary); }
  .w span { font-size: 15px; }
</style>
</head>
<body>
  <div class="blk">
    <div class="fam">Pretendard · Sans</div>
    <div class="big">평가 하네스 Ag</div>
    <div class="specimen">정확하고 가독성 좋은 한글 UI 서체. 대시보드와 테이블의 모든 본문에 사용합니다.</div>
    <div class="w"><span style="font-weight:400">Regular</span><span style="font-weight:500">Medium</span><span style="font-weight:600">Semibold</span><span style="font-weight:700">Bold</span></div>
  </div>
  <div class="blk">
    <div class="fam">JetBrains Mono</div>
    <div class="bigm">98.6% · r-8842</div>
    <div class="specimenm">run_id, threshold, latency<br/>0123456789 → 1,284 · 312ms</div>
    <div class="w"><span class="specimenm" style="font-weight:400">Regular</span><span class="specimenm" style="font-weight:500">Medium</span><span class="specimenm" style="font-weight:700">Bold</span></div>
  </div>
</body>
</html>
