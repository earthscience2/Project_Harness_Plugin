<!-- @dsCard group="Colors" viewport="700x120" name="데이터 시각화 팔레트" subtitle="6-step calm categorical sequence for charts" -->
<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--bg-canvas); }
  .row { display: flex; gap: 8px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 48px; border-radius: var(--radius-md); }
  .name { font: var(--text-2xs)/1 var(--font-mono); color: var(--text-tertiary); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="chip" style="background:var(--viz-1)"></div><div class="name">viz-1</div></div>
    <div class="col"><div class="chip" style="background:var(--viz-2)"></div><div class="name">viz-2</div></div>
    <div class="col"><div class="chip" style="background:var(--viz-3)"></div><div class="name">viz-3</div></div>
    <div class="col"><div class="chip" style="background:var(--viz-4)"></div><div class="name">viz-4</div></div>
    <div class="col"><div class="chip" style="background:var(--viz-5)"></div><div class="name">viz-5</div></div>
    <div class="col"><div class="chip" style="background:var(--viz-6)"></div><div class="name">viz-6</div></div>
  </div>
</body>
</html>
