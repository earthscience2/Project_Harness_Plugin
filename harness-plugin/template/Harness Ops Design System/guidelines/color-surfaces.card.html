<!-- @dsCard group="Colors" viewport="700x160" name="다크 서피스 & 보더" subtitle="App → canvas → surface 1/2/3, with border tiers" -->
<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--bg-canvas); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-default); }
  .name { font: var(--weight-semibold) var(--text-xs)/1.2 var(--font-sans); color: var(--text-secondary); }
  .tok { font: var(--text-2xs)/1.2 var(--font-mono); color: var(--text-tertiary); }
  .borders { display: flex; gap: 10px; margin-top: 14px; }
  .b { flex: 1; height: 34px; border-radius: var(--radius-md); background: var(--surface-1); display:flex; align-items:center; justify-content:center; font: var(--text-2xs)/1 var(--font-mono); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg-app)"></div><div class="name">App</div><div class="tok">--bg-app</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-canvas)"></div><div class="name">Canvas</div><div class="tok">--bg-canvas</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="name">Surface 1</div><div class="tok">--surface-1</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="name">Surface 2</div><div class="tok">--surface-2</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="name">Surface 3</div><div class="tok">--surface-3</div></div>
  </div>
  <div class="borders">
    <div class="b" style="border:1px solid var(--border-subtle)">subtle</div>
    <div class="b" style="border:1px solid var(--border-default)">default</div>
    <div class="b" style="border:1px solid var(--border-strong)">strong</div>
  </div>
</body>
</html>
