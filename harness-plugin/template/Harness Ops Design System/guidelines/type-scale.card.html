<!-- @dsCard group="Type" viewport="700x230" name="타입 스케일" subtitle="Display → caption, with token + size" -->
<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg-canvas); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border-bottom: 0; }
  .spec { color: var(--text-primary); font-family: var(--font-sans); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { font: var(--text-2xs)/1 var(--font-mono); color: var(--text-tertiary); width: 150px; text-align: right; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="r"><span class="spec" style="font-size:var(--text-4xl);font-weight:700;letter-spacing:var(--tracking-tight)">Display 38</span><span class="meta">--text-4xl · 700</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-2xl);font-weight:600;letter-spacing:var(--tracking-tight)">Title 24</span><span class="meta">--text-2xl · 600</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-lg);font-weight:600">Heading 17</span><span class="meta">--text-lg · 600</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-base);font-weight:400">Body 14 — 기본 본문</span><span class="meta">--text-base · 400</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-sm);font-weight:500">Label 13</span><span class="meta">--text-sm · 500</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-xs);color:var(--text-tertiary)">Caption 12</span><span class="meta">--text-xs · 400</span></div>
  <div class="r"><span class="spec" style="font-size:var(--text-2xs);font-weight:600;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-tertiary)">Eyebrow 11</span><span class="meta">--text-2xs · 600</span></div>
</body>
</html>
