<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-canvas); }
  .grid { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-tertiary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.HarnessOpsDesignSystem_019284;
const I = (d) => <svg className="hns-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
const Play = I(<polygon points="6 4 19 12 6 20 6 4" fill="currentColor" stroke="none"/>);
const Plus = I(<><path d="M12 5v14"/><path d="M5 12h14"/></>);
const More = I(<><circle cx="12" cy="5" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="19" r="1.4" fill="currentColor"/></>);
const Search = I(<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>);

ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="grid">
    <div className="row">
      <Button variant="primary" iconLeft={Play}>실행</Button>
      <Button variant="secondary">취소</Button>
      <Button variant="subtle" iconLeft={Plus}>케이스 추가</Button>
      <Button variant="ghost">필터</Button>
      <Button variant="danger">삭제</Button>
      <Button variant="primary" loading>실행 중</Button>
      <Button variant="secondary" disabled>비활성</Button>
    </div>
    <div className="row">
      <Button variant="primary" size="sm">Small</Button>
      <Button variant="primary" size="md">Medium</Button>
      <Button variant="primary" size="lg">Large</Button>
      <IconButton label="더보기" variant="secondary">{More}</IconButton>
      <IconButton label="추가" variant="ghost">{Plus}</IconButton>
      <IconButton label="실행" variant="subtle">{Play}</IconButton>
    </div>
    <div className="row" style={{ alignItems: 'flex-start' }}>
      <div className="col"><Input label="Suite 이름" placeholder="예: nightly-eval" /></div>
      <div className="col"><Input label="검색" placeholder="run id…" iconLeft={Search} /></div>
      <div className="col"><Input label="Threshold" mono defaultValue="0.85" hint="0–1 사이" /></div>
      <div className="col"><Select label="모델" options={['gpt-4o','claude-3.7','llama-3.1']} /></div>
    </div>
    <div className="row" style={{ gap: 28 }}>
      <Checkbox label="실패 케이스만" defaultChecked />
      <Checkbox label="회귀 포함" />
      <Radio name="env" label="staging" defaultChecked />
      <Radio name="env" label="production" />
      <Switch label="자동 재실행" defaultChecked />
      <Switch label="알림" />
    </div>
  </div>
);
</script>
</body>
</html>
