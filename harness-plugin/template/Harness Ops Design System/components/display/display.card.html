<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-canvas); }
  .grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 18px; align-items: start; }
  .stats { display: flex; gap: 28px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Stat, ProgressBar, DataTable, StatusBadge } = window.HarnessOpsDesignSystem_019284;
const rows = [
  { id: 'r-8842', suite: 'reasoning-v3', status: 'passed', pass: '96.1%' },
  { id: 'r-8841', suite: 'safety-redteam', status: 'failed', pass: '71.0%' },
  { id: 'r-8840', suite: 'rag-grounding', status: 'running', pass: '—' },
];
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="grid">
    <Card title="실행 요약" subtitle="최근 24시간">
      <Card.Body>
        <div className="stats">
          <Stat label="통과율" value="94.2" unit="%" delta="+1.4%" trend="up" />
          <Stat label="평균 지연" value="312" unit="ms" delta="-8ms" trend="down" />
        </div>
        <div style={{ marginTop: 18, display:'flex', flexDirection:'column', gap:8 }}>
          <ProgressBar segments={[
            { value: 84, color: 'var(--success)' },
            { value: 11, color: 'var(--danger)' },
            { value: 5, color: 'var(--neutral-status)' },
          ]} />
          <div style={{ font: 'var(--text-xs)/1 var(--font-sans)', color:'var(--text-tertiary)' }}>통과 84% · 실패 11% · 건너뜀 5%</div>
        </div>
      </Card.Body>
    </Card>
    <DataTable
      columns={[
        { key:'id', header:'Run ID', mono:true },
        { key:'suite', header:'Suite', primary:true },
        { key:'status', header:'상태', render:(v)=> <StatusBadge status={v} /> },
        { key:'pass', header:'통과율', align:'right', mono:true },
      ]}
      rows={rows}
      getRowId={(r)=>r.id}
      selectedId="r-8841"
    />
  </div>
);
</script>
</body>
</html>
